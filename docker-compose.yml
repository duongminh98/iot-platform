services:
  mongo:
    image: mongo:latest
    container_name: iot-mongo
    ports:
      - "27017:27017"
    volumes:
      - iot-mongo-data:/data/db

  backend:
    build: .
    container_name: iot-backend
    ports:
      - "3000:3000"
      - "1883:1883"
    env_file:
      - .env
    environment:
      - MONGODB_URI=mongodb://mongo:27017/smart_locker_iot
    depends_on:
      - mongo
    restart: always

volumes:
  iot-mongo-data:
